name: Feature request
description: Suggest an enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user/business problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your ideal implementation
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Metrics, UX, maintainability, or performance impact
